<!doctype html>
<html lang="pt-BR">

    <title>Lumina | Inteligência Artificial em Tradução</title>
    <meta name="description" content="Traduza PDFs e Documentos preservando 100% do layout original com Inteligência Artificial." />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumina-translation-v4.azurewebsites.net/" />
    <meta property="og:title" content="Lumina | Tradução Neural de Documentos" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
